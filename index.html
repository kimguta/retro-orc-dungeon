<!doctype html>
<html lang="ko">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Paper Citadel - 종이성채</title>
    <link rel="stylesheet" href="style.css?v=20260527-paper-craft-2">
  </head>
  <body>
    <main class="shell">
      <canvas id="game" width="1280" height="720" aria-label="Paper Citadel 종이성채 게임 화면"></canvas>
      <div class="help">
        <span>WASD 이동</span>
        <span>마우스 / 방향키 시점</span>
        <span>좌클릭 공격 / 스페이스 점프</span>
        <span>우클릭 특수공격</span>
        <span>E 대화</span>
      </div>
      <form id="name-screen" class="name-screen" autocomplete="off">
        <div class="name-panel">
          <p class="eyebrow">Paper Citadel</p>
          <h1>종이성채</h1>
          <p class="entry-copy">이름 하나로 바로 입장해서 성채를 달리고, 친구들과 발록을 반복 트라이합니다.</p>
          <label for="character-name">캐릭터명</label>
          <div class="name-row">
            <input id="character-name" maxlength="18" placeholder="이름 입력" required>
            <button type="submit">입장</button>
          </div>
          <p id="name-status">캐릭터명으로 저장 데이터를 불러옵니다.</p>
        </div>
      </form>
    </main>
    <script src="https://cdn.socket.io/4.8.3/socket.io.min.js"></script>
    <script src="game.js?v=20260527-paper-craft-2"></script>
  </body>
</html>
