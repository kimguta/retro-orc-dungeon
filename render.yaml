services:
  - type: web
    name: paper-citadel-server
    runtime: node
    plan: free
    rootDir: server
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /health
    autoDeployTrigger: commit
    envVars:
      - key: CLIENT_ORIGIN
        value: https://kimguta.github.io
      - key: MAX_PLAYERS_PER_ROOM
        value: "20"
